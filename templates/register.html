{% extends "base.html" %}
{% block title %}Create Account — Secure Auth Gateway{% endblock %}

{% block body %}
<div class="page-center">

  <a class="brand" href="/">
    <div class="brand-icon">🔐</div>
    <span class="brand-name">Secure Auth Gateway</span>
  </a>

  <div class="card">
    <h1 class="card-title">Create an account</h1>
    <p class="card-subtitle">Your password is hashed with Argon2id and never stored in plaintext.</p>

    <div class="alert alert-error"   id="msg-error"></div>
    <div class="alert alert-success" id="msg-success"></div>

    <form id="register-form">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email"
               placeholder="you@example.com" autocomplete="email" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               placeholder="Minimum 8 characters" autocomplete="new-password"
               minlength="8" required>
      </div>

      <!--
        HONEYPOT FIELD — hidden from real users, visible to bots.
        If this field is submitted with a non-empty value, the server
        knows the request came from an automated script and rejects it.
      -->
      <div class="hp-field" aria-hidden="true">
        <input type="text" name="website" tabindex="-1" autocomplete="off" value="">
      </div>

      <button type="submit" class="btn btn-primary">Create account</button>
    </form>

    <div class="divider">or</div>

    <a href="/oauth/github/login" class="btn btn-github">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
                 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
                 -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
                 .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
                 -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
                 .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
                 .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
                 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8
                 c0-4.42-3.58-8-8-8z"/>
      </svg>
      Sign up with GitHub
    </a>

    <div class="card-footer">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>

</div>

<script>
  document.getElementById("register-form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const data   = new FormData(e.target);
    const errBox = document.getElementById("msg-error");
    const okBox  = document.getElementById("msg-success");

    errBox.classList.remove("visible");
    okBox.classList.remove("visible");

    try {
      const res  = await fetch("/register", { method: "POST", body: data });
      const json = await res.json();

      if (res.ok) {
        okBox.textContent = json.message + " Redirecting to login...";
        okBox.classList.add("visible");
        setTimeout(() => window.location.href = "/login", 1200);
      } else {
        errBox.textContent = json.error || "Registration failed.";
        errBox.classList.add("visible");
      }
    } catch (err) {
      errBox.textContent = "Network error. Please try again.";
      errBox.classList.add("visible");
    }
  });
</script>
{% endblock %}
